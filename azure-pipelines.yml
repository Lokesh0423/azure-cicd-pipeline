trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - app/**
      - k8s/**

pr:
  branches:
    include:
      - main

variables:
  ACR_NAME: 'lokesh0423acr'
  IMAGE_NAME: 'nodejs-cicd-pipeline'
  IMAGE_TAG: '$(Build.BuildId)'

stages:

# ─── STAGE 1: BUILD & PUSH TO ACR ────────────────────────────────────────────
- stage: Build
  displayName: 'Build and Push to ACR'
  jobs:
    - job: BuildAndPush
      displayName: 'Build Docker Image and Push to ACR'
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: NodeTool@0
          inputs:
            versionSpec: '18.x'
          displayName: 'Install Node.js 18'

        - script: |
            cd app
            npm install
            npm test
          displayName: 'Install dependencies and run tests'

        - task: PublishTestResults@2
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '**/test-results.xml'
          condition: succeededOrFailed()
          displayName: 'Publish test results'

        - task: Docker@2
          displayName: 'Build Docker image'
          inputs:
            command: build
            repository: 'lokesh0423acr.azurecr.io/$(IMAGE_NAME)'
            dockerfile: 'app/Dockerfile'
            tags: |
              $(IMAGE_TAG)
              latest

        - task: AzureCLI@2
          displayName: 'Push image to ACR'
          inputs:
            azureSubscription: 'Azure-Service-Connection'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name lokesh0423acr
              docker push lokesh0423acr.azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)
              docker push lokesh0423acr.azurecr.io/$(IMAGE_NAME):latest
              echo "Image pushed successfully to lokesh0423acr.azurecr.io"
              az acr repository list --name lokesh0423acr --output table
